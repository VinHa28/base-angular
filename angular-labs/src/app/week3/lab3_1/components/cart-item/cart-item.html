<div
  class="flex items-center gap-4 px-5 py-4 bg-white border border-slate-100 rounded-md shadow-sm hover:shadow-md transition-shadow duration-200 group"
>
  <!-- Product Image Placeholder -->
  <div
    class="w-16 h-16 flex-shrink-0 rounded-md bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center overflow-hidden"
  >
    <img
      [src]="'https://placehold.co/64x64/f1f5f9/94a3b8?text=IMG'"
      [alt]="item.name"
      class="w-full h-full object-cover rounded-md"
    />
  </div>

  <!-- Product Info -->
  <div class="flex-1 min-w-0">
    <h3 class="text-sm font-semibold text-slate-800 truncate leading-tight">{{ item.name }}</h3>
    <p class="text-xs text-slate-400 mt-0.5">SKU #{{ item.id }}</p>
    <p class="text-base font-bold text-indigo-600 mt-1">{{ item.price | currency: 'VND' }}</p>
  </div>

  <!-- Quantity Controls -->
  <div class="flex items-center gap-2 flex-shrink-0">
    <button
      (click)="onDecrease()"
      class="w-7 h-7 rounded-md bg-slate-100 hover:bg-indigo-100 hover:text-indigo-600 text-slate-500 flex items-center justify-center transition-colors duration-150 text-sm font-bold"
      aria-label="Decrease quantity"
    >
      −
    </button>
    <span class="w-6 text-center text-sm font-semibold text-slate-700">{{ item.quantity }}</span>
    <button
      (click)="onIncrease()"
      class="w-7 h-7 rounded-md bg-slate-100 hover:bg-indigo-100 hover:text-indigo-600 text-slate-500 flex items-center justify-center transition-colors duration-150 text-sm font-bold"
      aria-label="Increase quantity"
    >
      +
    </button>
  </div>

  <!-- Subtotal -->
  <div class="w-20 text-right flex-shrink-0">
    <p class="text-sm font-bold text-slate-800">
      {{ item.price * item.quantity | currency: 'VND' }}
    </p>
    <p class="text-xs text-slate-400">subtotal</p>
  </div>

  <!-- Remove Button -->
  <button
    (click)="onRemove()"
    class="ml-1 w-8 h-8 flex-shrink-0 rounded-md flex items-center justify-center text-slate-300 hover:text-red-400 hover:bg-red-50 transition-colors duration-150 opacity-0 group-hover:opacity-100"
    aria-label="Remove item"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="w-4 h-4"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
      stroke-width="2"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
      />
    </svg>
  </button>
</div>
