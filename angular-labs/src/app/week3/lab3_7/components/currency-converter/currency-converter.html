<form
  [formGroup]="converterForm"
  class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 space-y-5"
>
  <!-- Số tiền -->
  <div>
    <label for="amount" class="block text-xs font-medium text-slate-500 mb-1.5">Số tiền mặt</label>
    <div class="relative">
      <span
        class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm font-medium"
        id="currencyPrefix"
        >{{ symbols[converterForm.controls['sourceCurrency'].value] }}</span
      >
      <input
        formControlName="amount"
        id="amount"
        type="number"
        min="0"
        value="100"
        placeholder="0"
        class="w-full pl-8 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500 transition"
      />
    </div>
  </div>

  <!-- Dropdowns -->
  <div class="grid grid-cols-[1fr_1fr] items-end gap-3">
    <!-- Tiền gốc -->
    <div>
      <label for="fromCurrency" class="block text-xs font-medium text-slate-500 mb-1.5"
        >Tiền tệ gốc</label
      >
      <div class="relative">
        <select
          id="fromCurrency"
          formControlName="sourceCurrency"
          class="w-full appearance-none bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 pr-8 text-sm text-slate-800 font-medium focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500 transition cursor-pointer"
        >
          <option value="USD">USD ($)</option>
          <option value="EUR">EUR (€)</option>
          <option value="CNY">CNY (¥)</option>
          <option value="JPY">JPY (¥)</option>
          <option value="VND">VND (đ)</option>
        </select>
        <svg
          class="pointer-events-none absolute right-2.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </div>
    </div>
    <!-- Tiền đích -->
    <div>
      <label for="toCurrency" class="block text-xs font-medium text-slate-500 mb-1.5"
        >Quy đổi sang</label
      >
      <div class="relative">
        <select
          id="toCurrency"
          formControlName="targetCurrency"
          class="w-full appearance-none bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 pr-8 text-sm text-slate-800 font-medium focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500 transition cursor-pointer"
        >
          <option value="USD">USD ($)</option>
          <option value="EUR">EUR (€)</option>
          <option value="CNY">CNY (¥)</option>
          <option value="JPY">JPY (¥)</option>
          <option value="VND">VND (đ)</option>
        </select>
        <svg
          class="pointer-events-none absolute right-2.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </div>
    </div>
  </div>

  <!-- Divider -->
  <hr class="border-slate-100" />

  <!-- Result -->
  <div class="bg-gradient-to-br from-brand-50 to-indigo-50 rounded-xl p-4 border border-[#e0e7ff]">
    <p class="text-xs font-medium text-slate-500 mb-2 flex items-center gap-1.5">
      <svg
        class="w-3.5 h-3.5 text-[#6366f1]"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 11h.01M12 11h.01M15 11h.01M4 19h16a2 2 0 002-2V7a2 2 0 00-2-2H4a2 2 0 00-2 2v10a2 2 0 002 2z"
        />
      </svg>
      Kết quả quy đổi
    </p>
    <div id="resultBlock" class="result-pulse">
      <div class="flex items-baseline gap-2 flex-wrap">
        <span id="resultAmount" class="text-3xl font-semibold text-slate-800">
          {{ convertedResult | currency: converterForm.controls['targetCurrency'].value }}
        </span>
      </div>
    </div>
  </div>
</form>
