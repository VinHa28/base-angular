<div
  class="card text-center shadow-sm p-4"
  style="background-color: #f8f9fa; border: 2px dashed #0d6efd"
>
  <h3 class="text-primary mb-3">Countdown</h3>

  <div class="display-1 fw-bold my-3 text-dark">
    {{ seconds() }} <span class="fs-4 text-muted">seconds</span>
  </div>

  <p class="text-muted italic">
    Status: <strong>{{ message }}</strong>
  </p>
</div>
