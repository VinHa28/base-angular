<div>
  <h2 class="font-semibold text-[18px] mt-3">Tìm Kiếm Sản Phẩm</h2>
  <input
    [formControl]="searchControl"
    type="text"
    placeholder="Nhập tên sản phẩm (nhập nhiều hơn 3 ký tự)..."
    class="border-1 py-1 px-3 mt-2 w-[350px] rounded-md"
  />

  <ul class="ml-4 mt-5 list-disc mb-5">
    @for (item of searchResults; track $index) {
      <li>{{ item }}</li>
    } @empty {
      <li><i>Không có sản phẩm</i></li>
    }
  </ul>
</div>
